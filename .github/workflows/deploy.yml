name: 'Terraform AWS Deploy'

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for requesting the OIDC token
  contents: read  # Required for checking out the code

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    
    # Maps your GitHub password secret directly to a Terraform variable
    env:
      TF_VAR_vm_password: ${{ secrets.VM_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/GitHubActions-Terraform-Role # Double check this ARN string!
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan